# Nothing Engine: Validation Gate Criteria
# All gates must PASS before main experiments.

gate_4_1_static_casimir:
  description: "Production energy and force paths reproduce the analytic static Casimir terms"
  track: "B"
  method: "Initialize the finite mode vacuum, then inspect field energy and mechanical acceleration"
  boundaries: ["closed", "periodic"]
  N_modes_sweep: [8, 32, 128, 512]
  tolerance_absolute: 2.0e-11
  pass_criterion: "Energy, force, and excitation errors are below tolerance"

gate_4_2_dynamic_casimir:
  description: "Diagonal parametric oscillator growth matches its reduced-model prediction"
  track: "B"
  method: "Drive plate at Omega = 2*omega_1, extract |beta_1|^2 growth rate"
  prescribed_amplitude_eps: 1.0e-2
  N_modes: 8
  duration: 40.0
  integrator: "DOP853"
  tolerance_relative: 0.10      # 10% agreement on the occupation benchmark
  pass_criterion: "Final cycle-averaged occupation is within 10% of the diagonal model prediction"

gate_4_3_energy_conservation:
  description: "Closed-system energy conservation"
  track: "B"
  method: "Full coupled run, monitor E_total"
  N_modes: 16
  duration: 30.0                # Natural time units
  integrator: "DOP853"
  pass_criterion: "max |E(t) - E(0)| / E_plate(0) < 1e-4"

gate_4_6_adiabatic_limit:
  description: "Heavy/slow plate creates negligible particles"
  track: "B"
  method: "v0 = 1e-6, M = 1e8, run for T=50"
  N_modes: 16
  initial_velocity: 1.0e-6
  plate_mass: 1.0e8
  duration: 50.0
  integrator: "DOP853"
  pass_criterion: "Total particle number N(T) < 1e-6"
  # Compare to resonant case: should be 100x smaller

gate_4_7_residual_baseline:
  description: "Plate at rest in vacuum shows zero particle creation"
  track: "B"
  method: "Hold q fixed and evolve the finite mode vacuum"
  N_modes: 16
  initial_velocity: 0.0
  duration: 20.0
  integrator: "DOP853"
  pass_criterion: "max |beta_n|^2 < 1e-10 for all n"
